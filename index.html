<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A/B Audio Player</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="player">
  <div class="top-row">
    <button id="playPauseBtn" class="play-btn" aria-label="Play or pause">▶</button>

    <div class="toggle-wrap">
      <button id="beforeBtn" class="toggle-btn active">Before</button>
      <button id="afterBtn" class="toggle-btn">After</button>
    </div>
  </div>

  <div class="progress-wrap">
    <span id="currentTime">0:00</span>
    <input id="seekBar" type="range" min="0" max="100" value="0" />
    <span id="duration">0:00</span>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
